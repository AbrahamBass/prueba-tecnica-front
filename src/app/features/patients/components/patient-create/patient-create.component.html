<form [formGroup]="patientGroup" class="p-fluid">
  <div class="grid">
    
    <div class="col-12 md:col-6 field">
      <label class="font-bold mb-2 block">Tipo de Documento *</label>
      <p-dropdown
        [options]="documentTypes"
        formControlName="documentType"
        placeholder="Seleccione uno"
        appendTo="body"
        [styleClass]="isInvalid('documentType') ? 'ng-invalid ng-dirty' : ''"
      >
      </p-dropdown>
      <small class="p-error block mt-1" *ngIf="isInvalid('documentType')">
        El tipo de documento es obligatorio.
      </small>
    </div>

    <div class="col-12 md:col-6 field">
      <label class="font-bold mb-2 block">Número de Documento *</label>
      <input
        pInputText
        formControlName="documentNumber"
        placeholder="Ej: 10203040"
        [class.ng-invalid]="isInvalid('documentNumber')"
      />
      <small class="p-error block mt-1" *ngIf="isInvalid('documentNumber')">
        <span *ngIf="patientGroup.get('documentNumber')?.errors?.['required']">El número de documento es obligatorio.</span>
        <span *ngIf="patientGroup.get('documentNumber')?.errors?.['pattern']">Solo se permiten números.</span>
      </small>
    </div>

    <div class="col-12 md:col-6 field">
      <label class="font-bold mb-2 block">Nombres *</label>
      <input 
        pInputText 
        formControlName="firstName" 
        [class.ng-invalid]="isInvalid('firstName')"
      />
      <small class="p-error block mt-1" *ngIf="isInvalid('firstName')">
        El nombre es obligatorio (mínimo 2 caracteres).
      </small>
    </div>

    <div class="col-12 md:col-6 field">
      <label class="font-bold mb-2 block">Apellidos *</label>
      <input 
        pInputText 
        formControlName="lastName" 
        [class.ng-invalid]="isInvalid('lastName')"
      />
      <small class="p-error block mt-1" *ngIf="isInvalid('lastName')">
        El apellido es obligatorio.
      </small>
    </div>

    <div class="col-12 field">
      <label class="font-bold mb-2 block">Correo Electrónico</label>
      <div class="p-inputgroup">
        <span class="p-inputgroup-addon"><i class="pi pi-envelope"></i></span>
        <input
          pInputText
          formControlName="email"
          placeholder="email@ejemplo.com"
          [class.ng-invalid]="isInvalid('email')"
        />
      </div>
      <small class="p-error block mt-1" *ngIf="isInvalid('email')">
        Ingrese un formato de correo válido.
      </small>
    </div>

    <div class="col-12 md:col-6 field">
      <label class="font-bold mb-2 block">Fecha de Nacimiento *</label>
      <p-calendar
        formControlName="birthDate"
        styleClass="p-inputtext-sm"
        [styleClass]="isInvalid('birthDate') ? 'ng-invalid ng-dirty' : ''"
        dateFormat="dd/mm/yy"
        [showIcon]="true"
        [appendTo]="'body'"
        placeholder="dd/mm/aaaa"
      >
      </p-calendar>
      <small class="p-error block mt-1" *ngIf="isInvalid('birthDate')">
        La fecha de nacimiento es obligatoria.
      </small>
    </div>

    <div class="col-12 md:col-6 field">
      <label class="font-bold mb-2 block">Teléfono</label>
      <input 
        pInputText 
        formControlName="phone" 
        placeholder="300 123 4567" 
        [class.ng-invalid]="isInvalid('phone')"
      />
    </div>
  </div>

  <div class="flex justify-content-end gap-2 mt-4 pt-3 border-top-1 border-200">
    <button
      type="button"
      pButton
      label="Cancelar"
      icon="pi pi-times"
      class="p-button-text p-button-secondary"
      (click)="cancel()"
    ></button>
    <button
      type="button"
      (click)="save()"
      [loading]="loading()"
      pButton
      label="Guardar Paciente"
      icon="pi pi-check"
      class="p-button-primary shadow-2"
      [disabled]="patientGroup.invalid"
    ></button>
  </div>
</form>
