<div class="p-fluid">
  <div class="field">
    <label class="font-bold block mb-2 text-700"
      >Pacientes creados desde:</label
    >
    <p-calendar
      [(ngModel)]="selectedDate"
      [showIcon]="true"
      dateFormat="dd/mm/yy"
      placeholder="Seleccione una fecha"
      appendTo="body"
    >
    </p-calendar>
    <small class="text-500 mt-1 block"
      >Se exportarán todos los registros posteriores a esta fecha.</small
    >
  </div>

  <div class="flex justify-content-end gap-2 mt-5 pt-3 border-top-1 border-100">
    <button
      pButton
      label="Cancelar"
      class="p-button-text p-button-secondary"
      (click)="close()"
    ></button>
    <button
      pButton
      label="Descargar Excel"
      icon="pi pi-file-excel"
      class="p-button-success"
      [loading]="loading"
      [disabled]="!selectedDate"
      (click)="exportExcel()"
    ></button>
  </div>
</div>
