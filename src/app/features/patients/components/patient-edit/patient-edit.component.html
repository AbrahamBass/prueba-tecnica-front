<form [formGroup]="patientForm" (ngSubmit)="save()" class="p-fluid">
  <div class="grid mt-2">
    
    <div class="col-12 md:col-6 field">
      <label class="font-bold block mb-2">Nombres *</label>
      <input 
        pInputText 
        formControlName="firstName" 
        [class.ng-invalid]="isInvalid('firstName')"
      />
      <small class="p-error block mt-1" *ngIf="isInvalid('firstName')">
        El nombre es obligatorio.
      </small>
    </div>

    <div class="col-12 md:col-6 field">
      <label class="font-bold block mb-2">Apellidos *</label>
      <input 
        pInputText 
        formControlName="lastName" 
        [class.ng-invalid]="isInvalid('lastName')"
      />
      <small class="p-error block mt-1" *ngIf="isInvalid('lastName')">
        El apellido es obligatorio.
      </small>
    </div>

    <div class="col-12 md:col-4 field">
      <label class="font-bold block mb-2">Tipo Doc. *</label>
      <p-dropdown
        [options]="documentTypes"
        formControlName="documentType"
        placeholder="Seleccione uno"
        appendTo="body"
        [styleClass]="isInvalid('documentType') ? 'ng-invalid ng-dirty' : ''"
      >
      </p-dropdown>
      <small class="p-error block mt-1" *ngIf="isInvalid('documentType')">
        Requerido.
      </small>
    </div>

    <div class="col-12 md:col-8 field">
      <label class="font-bold block mb-2">Número de Documento *</label>
      <input 
        pInputText 
        formControlName="documentNumber" 
        [class.ng-invalid]="isInvalid('documentNumber')"
      />
      <small class="p-error block mt-1" *ngIf="isInvalid('documentNumber')">
        Ingrese un número válido.
      </small>
    </div>

    <div class="col-12 md:col-6 field">
      <label class="font-bold block mb-2">Fecha de Nacimiento *</label>
      <p-calendar
        formControlName="birthDate"
        [showIcon]="true"
        dateFormat="dd/mm/yy"
        appendTo="body"
        placeholder="Seleccione fecha"
        [styleClass]="isInvalid('birthDate') ? 'ng-invalid ng-dirty' : ''"
      >
      </p-calendar>
      <small class="p-error block mt-1" *ngIf="isInvalid('birthDate')">
        La fecha es obligatoria.
      </small>
    </div>

    <div class="col-12 md:col-6 field">
      <label class="font-bold block mb-2">Teléfono</label>
      <input
        pInputText
        formControlName="phoneNumber"
        placeholder="3001234567"
      />
    </div>

    <div class="col-12 field">
      <label class="font-bold block mb-2">Correo Electrónico</label>
      <input
        pInputText
        formControlName="email"
        placeholder="paciente@ejemplo.com"
        [class.ng-invalid]="isInvalid('email')"
      />
      <small class="p-error block mt-1" *ngIf="isInvalid('email')">
        Formato de correo inválido.
      </small>
    </div>
  </div>

  <div class="flex justify-content-end gap-2 mt-4 pt-3 border-top-1 border-200">
    <button
      pButton
      type="button"
      label="Cancelar"
      class="p-button-text p-button-secondary"
      (click)="close()"
    ></button>
    
    <button
      pButton
      type="submit"
      [label]="isFormUnchanged ? 'Sin Cambios' : 'Guardar Cambios'"
      icon="pi pi-save"
      [loading]="loading()"
      [disabled]="patientForm.invalid || isFormUnchanged"
      [class]="isFormUnchanged ? 'p-button-secondary opacity-50' : 'p-button-primary'"
    ></button>
  </div>
</form>
