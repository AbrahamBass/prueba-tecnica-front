<div class="p-4">
  <p-toolbar styleClass="mb-4 border-round bg-white p-3">
    <div class="p-toolbar-group-start w-full md:w-auto mb-3 md:mb-0">
      <h1
        class="text-xl md:text-3xl font-bold m-0 text-900 flex align-items-center"
      >
        <i class="pi pi-users text-blue-500 text-2xl md:text-3xl mr-2"></i>
        Gestión de Pacientes
      </h1>
    </div>

    <div class="p-toolbar-group-end w-full md:w-auto">
      <div
        class="flex flex-wrap justify-content-start md:justify-content-end gap-2 w-full"
      >
        <button
          pButton
          label="Exportar CSV"
          icon="pi pi-file"
          [loading]="loadingCSV()"
          class="p-button-sm p-button-help p-button-outlined flex-grow-1 md:flex-grow-0"
          (click)="exportCSV()"
        ></button>

        <button
          pButton
          label="Reporte Excel"
          icon="pi pi-file-excel"
          class="p-button-sm p-button-success p-button-outlined flex-grow-1 md:flex-grow-0"
          (click)="showReportModal()"
        ></button>

        <button
          pButton
          pRipple
          label="Nuevo paciente"
          icon="pi pi-plus"
          class="p-button-sm w-full md:w-auto"
          (click)="showCreatePatient()"
        ></button>
      </div>
    </div>
  </p-toolbar>

  <app-patients-table
    [cols]="cols"
    [nameValue]="nameFilter"
    [docValue]="documentFilter"
    [patients]="patients()"
    [totalRecords]="totalRecords()"
    [loading]="loadingTable()"
    [rows]="pageSize"
    (lazyLoad)="onLazyLoad($event)"
    (filter)="onFilter()"
    (nameChange)="nameFilter = $event"
    (docChange)="documentFilter = $event"
    (view)="openDetail($event)"
    (edit)="openEdit($event)"
    (delete)="delete($event)"
    (onFilter)="onFilter()"
    (clearFilters)="clearFilters()"
  ></app-patients-table>

  <p-confirmDialog></p-confirmDialog>
  <p-toast></p-toast>
</div>
